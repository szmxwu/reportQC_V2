<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>危急值漏报查询</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
    />
    <style>
      .container {
        margin-top: 20px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <center><h1>危急值漏报检索</h1></center><br><br>
      <h2>请输入查询日期</h2>
      <div class="form-group">
        <label for="critical_start_time" class="form-label">开始日期:</label>
        <input
          type="date"
          id="critical_start_time"
          name="start_time"
          class="form-control"
          required
        />
      </div>
      <div class="form-group">
        <label for="critical_end_time" class="form-label">结束日期:</label>
        <input
          type="date"
          id="critical_end_time"
          name="end_time"
          class="form-control"
          required
        />
      </div>
      <button
        type="button"
        id="critical_query_button"
        class="btn btn-primary mt-3"
      >
        查询
      </button>

      <div id="critical_progress_container" class="hidden mt-3">
        <div class="progress">
          <div
            id="critical_progress_bar"
            class="progress-bar"
            role="progressbar"
            style="width: 0%"
            aria-valuenow="0"
            aria-valuemin="0"
            aria-valuemax="100"
          >
            <span id="progress_text">0%<span>
        </div>
        </div>
        <a id="critical_download_link" href="#" class="hidden mt-3">下载文件</a>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script>
      $(document).ready(function () {
        $("#critical_query_button").on("click", function () {
          var startTime = $("#critical_start_time").val();
          var endTime = $("#critical_end_time").val();

          if (!startTime || !endTime) {
            alert("请输入正确的日期.");
            return;
          }

          var data = {
            start_time: startTime,
            end_time: endTime,
          };

          $("#critical_progress_container").removeClass("hidden");
          var progressBar = $("#critical_progress_bar");
          var downloadLink = $("#critical_download_link");

          $.ajax({
            type: "POST",
            url: "/submit_critical",
            data: JSON.stringify(data),
            contentType: "application/json",
            success: function (response) {
              var task_id = response.task_id;
              pollProgress(task_id);
            },
          });

          function pollProgress(task_id) {
            $.ajax({
              type: "GET",
              url: "/progress/" + task_id,
              success: function (response) {
                var progress = response.progress;
                progressBar
                  .css("width", progress + "%")
                  .attr("aria-valuenow", progress);
                var progressText=$('#progress_text');
                progressText.text(progress+'%');
                if (progress < 100) {
                  setTimeout(function () {
                    pollProgress(task_id);
                  }, 1000); // Poll every second
                } else {
                  if (response.file_url!==''){
                    downloadLink
                      .attr("href", response.file_url)
                      .removeClass("hidden");
                  }
                }
              },
            });
          }
        });
      });
    </script>
  </body>
</html>
